# FlowSteer dataset catalog aligned with arXiv:2602.01664v4.
# Files are expected after downloading beita6969/FlowSteer-Dataset into ./data.

data:
  base_dir: ./data
  train_file: ./data/train/train_12k.jsonl
  eval_dir: ./data/eval

paper_recipe:
  iid_training_total: 10778
  iid_training_mix:
    gsm8k: 2560
    math: 2560
    hotpotqa: 2560
    squad_v2: 2560
    mbpp: 374
    humaneval: 164
  note: >-
    The public Hugging Face release also provides train/train_12k.jsonl as a
    balanced convenience training file. The paper appendix reports the
    10,778-instance IID training recipe above.

training:
  datasets:
    - name: gsm8k
      path: ./data/train/train_12k.jsonl
      source_key: gsm8k
      type: math
      metric: exact_match
    - name: math
      path: ./data/train/train_12k.jsonl
      source_key: math
      type: math
      metric: exact_match
    - name: hotpotqa
      path: ./data/train/train_12k.jsonl
      source_key: hotpotqa
      type: multi_hop_qa
      metric: token_f1
    - name: squad_v2
      path: ./data/train/train_12k.jsonl
      source_key: squad_v2
      type: qa
      metric: token_f1
    - name: mbpp
      path: ./data/train/train_12k.jsonl
      source_key: mbpp
      type: code
      metric: pass_at_1
    - name: humaneval
      path: ./data/train/train_12k.jsonl
      source_key: humaneval
      type: code
      metric: pass_at_1

validation:
  datasets:
    - name: gsm8k
      path: ./data/eval/gsm8k.jsonl
      size: 128
      type: math
      metric: exact_match
    - name: math
      path: ./data/eval/math.jsonl
      size: 128
      type: math
      metric: exact_match
    - name: hotpotqa
      path: ./data/eval/hotpotqa.jsonl
      size: 128
      type: multi_hop_qa
      metric: token_f1
    - name: squad_v2
      path: ./data/eval/squad_v2.jsonl
      size: 128
      type: qa
      metric: token_f1
    - name: mbpp
      path: ./data/eval/mbpp.jsonl
      size: 128
      type: code
      metric: pass_at_1
    - name: humaneval
      path: ./data/eval/humaneval.jsonl
      size: 128
      type: code
      metric: pass_at_1

evaluation:
  iid:
    - gsm8k
    - math
    - hotpotqa
    - squad_v2
    - mbpp
    - humaneval
  ood:
    - triviaqa
    - nq
    - mathqa
    - aime2025
    - apps
    - ds1000
  files:
    gsm8k: ./data/eval/gsm8k.jsonl
    math: ./data/eval/math.jsonl
    hotpotqa: ./data/eval/hotpotqa.jsonl
    squad_v2: ./data/eval/squad_v2.jsonl
    mbpp: ./data/eval/mbpp.jsonl
    humaneval: ./data/eval/humaneval.jsonl
    triviaqa: ./data/eval/triviaqa.jsonl
    nq: ./data/eval/nq.jsonl
    mathqa: ./data/eval/mathqa.jsonl
    aime2025: ./data/eval/aime2025.jsonl
    apps: ./data/eval/apps.jsonl
    ds1000: ./data/eval/ds1000.jsonl
  metrics:
    math: exact_match
    qa: token_f1
    code: pass_at_1

sampling:
  samples_per_source: 6
  samples_per_group: 36
  shuffle: true
  seed: 42
